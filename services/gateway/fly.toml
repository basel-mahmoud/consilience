# Fly.io deploy config for the gateway (the only public service).
# Deploy: fly deploy   (secrets set separately — see infra/DEPLOYMENT.md)

app = "consilience-gateway"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"    # keep the SignalR hub reachable
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    path = "/health"
    interval = "15s"
    timeout = "3s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
