name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # Gateway (.NET), Mesh (Python), and Engine (Java) jobs are added in the
  # milestone that introduces each service — every service ships with CI.
