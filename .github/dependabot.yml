version: 2
updates:
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # nuget (/services/gateway), pip (/services/mesh), and gradle
  # (/services/engine) entries are added when each service gains a manifest.
